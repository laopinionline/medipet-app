*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--azul:#1A5FB4;--azul-medio:#2272D9;--azul-claro:#5BA3E8;--azul-pale:#EBF3FC;--noche:#0D1B3E;--fondo:#F5F7FA;--texto:#1a2340;--suave:#5a6a8a}
body{font-family:'Nunito',sans-serif;background:var(--fondo);color:var(--texto);min-height:100vh}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(145deg,var(--noche),#1A3A7A,var(--azul))}
.screen.active{display:flex}
.auth-card{background:white;border-radius:24px;padding:36px 28px;width:100%;max-width:440px;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.auth-card.tall{max-height:90vh;overflow-y:auto}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.auth-logo .marca{font-weight:900;font-size:1.6rem;color:var(--azul);letter-spacing:-1px}
.auth-logo .marca span{color:var(--azul-claro)}
.auth-title{font-size:1.1rem;font-weight:800;margin-bottom:4px;color:var(--noche)}
.auth-sub{font-size:.8rem;color:var(--suave);margin-bottom:18px}
.fstack{display:flex;flex-direction:column;gap:10px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.input-field{width:100%;padding:12px 14px;border:2px solid rgba(26,95,180,.15);border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;color:var(--texto);background:var(--fondo);outline:none;transition:border-color .2s;display:block}
.input-field:focus{border-color:var(--azul-medio);background:white}
.btn-primary{width:100%;padding:13px;background:var(--azul);color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:background .2s}
.btn-primary:hover:not(:disabled){background:var(--noche)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.link-btn{background:none;border:none;color:var(--azul);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;text-decoration:underline}

.divider{border-top:1px solid var(--azul-pale);margin:16px 0;padding-top:14px;text-align:center}
.foto-label{display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--azul-pale);border-radius:12px;padding:12px 14px;font-size:.85rem;font-weight:700;color:var(--azul);border:2px dashed rgba(26,95,180,.2)}
#fotoPreview{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-top:10px;display:none;border:3px solid var(--azul-claro)}
/* APP */

.app-nav{background:var(--noche);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.app-nav .logo{display:flex;align-items:center;gap:8px}
.app-nav .logo .marca{font-weight:900;font-size:1.2rem;color:white}
.app-nav .logo .marca span{color:var(--azul-claro)}

.mascota-ph{width:64px;height:64px;border-radius:50%;background:var(--azul-pale);display:flex;align-items:center;justify-content:center;font-size:1.8rem}

.cl{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.6;margin-bottom:3px}
.cp{font-size:.9rem;font-weight:800;color:var(--azul-claro);margin-bottom:16px}
.cm{font-size:1.6rem;font-weight:900;line-height:1}
.cr{font-size:.7rem;opacity:.65;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.ctlbl{font-size:.65rem;opacity:.6;font-weight:700;margin-bottom:2px}

.cchip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:rgba(255,255,255,.12);border-radius:100px;padding:5px 12px;font-size:.75rem;font-weight:700}

.seccion{background:white;border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid rgba(26,95,180,.08)}
.stit{font-size:.85rem;font-weight:800;color:var(--noche);margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:4px;background:white;border-radius:16px;padding:6px;margin-bottom:16px;border:1px solid rgba(26,95,180,.08)}
.tab{flex:1;padding:10px;border:none;background:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;color:var(--suave);cursor:pointer;transition:all .2s}
.tab.active{background:var(--azul);color:white}
.uitem,.aitem{padding:14px;border-radius:12px;background:var(--fondo);margin-bottom:10px;border:1px solid rgba(26,95,180,.06)}
.bmini{padding:6px 14px;border:none;border-radius:100px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:800;cursor:pointer}

.pend-box{background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:12px 14px;margin-bottom:14px}

.form-box{background:var(--fondo);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid rgba(26,95,180,.12)}
@media(max-width:500px){.frow{grid-template-columns:1fr}.auth-card{padding:28px 18px}}

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBW3nLFqr55xYN16rSpapqIb6yVnyKbp-4",

  appId:"1:893304150807:web:4563f00e1a2a856124b552"
});
const auth=firebase.auth(), db=firebase.firestore(), storage=firebase.storage();
const TS=()=>firebase.firestore.FieldValue.serverTimestamp();

// Detectar si viene con ?plan=X o ?registro=1 desde la landing
(function() {
  const params = new URLSearchParams(window.location.search);
  const plan = params.get('plan');
  const registro = params.get('registro');
  if (plan || registro) {
    // Mostrar pantalla de registro automáticamente
    document.addEventListener('DOMContentLoaded', function() {
      showScreen('registerScreen');
      if (plan) {
        const sel = document.getElementById('regPlan');
        if (sel) {
          const opts = Array.from(sel.options);
          const match = opts.find(o => o.value.toLowerCase().includes(plan.toLowerCase()));
          if (match) sel.value = match.value;
        }
      }
    });
  }
})();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('appScreen').style.display='none';
  if(id==='appScreen'){document.getElementById('appScreen').style.display='block';}
  else{document.getElementById(id).classList.add('active');}
}
function v(id){return(document.getElementById(id)?.value||'').trim();}
function setMsg(id,msg,ok){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.color=ok?'#22c55e':'#ef4444';}}

// AUTH STATE
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      const snap=await db.collection('usuarios').doc(user.uid).get();
      if(snap.exists){showScreen('appScreen');renderPanel({uid:user.uid,...snap.data()});}
      else{setMsg('loginError','Tu registro está siendo procesado. Intentá en unos segundos.',false);await auth.signOut();showScreen('loginScreen');}
    }catch(e){setMsg('loginError','Error al cargar perfil: '+e.message,false);showScreen('loginScreen');}
  }else{showScreen('loginScreen');}
});

// LOGIN
async function doLogin(){
  const email=v('loginEmail'), pass=document.getElementById('loginPass').value;
  const btn=document.getElementById('btnLogin');
  setMsg('loginError','',true); btn.textContent='Ingresando...'; btn.disabled=true;
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){setMsg('loginError','Email o contraseña incorrectos.',false);btn.textContent='Ingresar';btn.disabled=false;}
}
function doLogout(){auth.signOut();}

// FOTO PREVIEW
function previewFoto(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{const p=document.getElementById('fotoPreview');p.src=e.target.result;p.style.display='block';};
    r.readAsDataURL(input.files[0]);
  }
}

function previewFotoTitular(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{const p=document.getElementById('fotoTitularPreview');if(p){p.src=e.target.result;p.style.display='block';}};
    r.readAsDataURL(input.files[0]);
  }
}

function comprimirFoto(file,MAX=300){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=(e)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h=h*MAX/w;w=MAX;}}else{if(h>MAX){w=w*MAX/h;h=MAX;}}
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.75));
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

// REGISTRO
async function doRegistro(){
  const nombre=v('regNombre'),apellido=v('regApellido'),email=v('regEmail'),tel=v('regTel');
  const pass=document.getElementById('regPass').value;
  const mascotaNombre=v('regMascota'),mascotaRaza=v('regRaza'),plan=v('regPlan');
  const fechaMascota=document.getElementById('regFechaMascota')?.value||'';
  const fotoTitularEl=document.getElementById('regFotoTitular');
  const fechaNac=document.getElementById('regFechaNac')?.value||'';
  const fotoInput=document.getElementById('regFoto');
  const btn=document.getElementById('btnRegistro');
  setMsg('regError','',true);
  if(!nombre||!email||!pass||!mascotaNombre){setMsg('regError','Completá los campos obligatorios (*).',false);return;}
  if(pass.length<6){setMsg('regError','La contraseña debe tener al menos 6 caracteres.',false);return;}
  btn.textContent='Creando cuenta...';btn.disabled=true;
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    const uid=cred.user.uid;
    // Comprimir foto mascota
    let fotoURL='';
    if(fotoInput.files&&fotoInput.files[0]){
      try{ fotoURL=await comprimirFoto(fotoInput.files[0]); }catch(fe){fotoURL='';}
    }
    // Comprimir foto titular
    let fotoTitularURL='';
    if(fotoTitularEl&&fotoTitularEl.files&&fotoTitularEl.files[0]){
      try{ fotoTitularURL=await comprimirFoto(fotoTitularEl.files[0]); }catch(fe){fotoTitularURL='';}
    }
    await db.collection('usuarios').doc(uid).set({
      uid,nombre,apellido,email,telefono:tel,fechaNacimiento:fechaNac,
      fotoTitular:fotoTitularURL,
      rol:'afiliado',estado:'pendiente',
      mascotas:[{nombre:mascotaNombre,raza:mascotaRaza,fechaNacimiento:fechaMascota,plan:plan||'Sin definir',foto:fotoURL}],
      creadoEn:TS()
    });
  }catch(e){
    btn.textContent='Crear mi cuenta';btn.disabled=false;
    if(e.code==='auth/email-already-in-use')setMsg('regError','Ese email ya está registrado.',false);
    else if(e.code==='auth/weak-password')setMsg('regError','Contraseña muy débil.',false);
    else setMsg('regError','Error: '+e.message,false);
  }
}

// CAMBIAR PASS
function toggleFormMascota(){
  const f=document.getElementById('formNuevaMascota');
  if(f) f.style.display=f.style.display==='none'?'block':'none';
}

function previewFoto2(input){
  if(input.files&&input.files[0]){

async function agregarMascota(uid){
  const nombre=v('newMascotaNombre'),raza=v('newMascotaRaza');
  const fecha=document.getElementById('newMascotaFecha')?.value||'';
  const plan=v('newMascotaPlan');
  const fotoEl=document.getElementById('newMascotaFoto');
  const msg=document.getElementById('mascotaMsg');
  if(msg) msg.textContent='';
  if(!nombre){if(msg){msg.textContent='Ingresá el nombre.';msg.style.color='#ef4444';}return;}
  let foto='';
  if(fotoEl&&fotoEl.files&&fotoEl.files[0]){
    try{ foto=await comprimirFoto(fotoEl.files[0]); }catch(e){foto='';}
  }
  try{
    const snap=await db.collection('usuarios').doc(uid).get();
    const ud=snap.data();
    const mascotas=ud.mascotas?[...ud.mascotas]:[];
    if(ud.mascota&&mascotas.length===0)mascotas.push(ud.mascota);
    mascotas.push({nombre,raza,fechaNacimiento:fecha,plan:plan||'Sin definir',foto});
    await db.collection('usuarios').doc(uid).update({mascotas});

async function descargarCarnet(index, nombreMascota) {
  const carnetEl = document.getElementById('carnet-' + index);
  if (!carnetEl) return;
  try {
    if (typeof html2canvas === 'undefined') {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      document.head.appendChild(script);
      await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });
    }
    const canvas = await html2canvas(carnetEl, { scale: 2, backgroundColor: null, logging: false, useCORS: true });
    const link = document.createElement('a');
    link.download = 'carnet-medipet-' + (nombreMascota||'mascota').toLowerCase().replace(/\s+/g,'-') + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Para guardar el carnet, hacé una captura de pantalla de esta sección.');
  }
}

// ADMIN: USUARIOS
async function cargarUsuariosAdmin(){
  const lista=document.getElementById('listaUsuarios');if(!lista)return;
  lista.innerHTML='<p style="color:#5a6a8a;font-size:.85rem;">Cargando...</p>';
  try{
    const snap=await db.collection('usuarios').get();
    const todos=snap.docs.map(d=>({id:d.id,...d.data()})).filter(u=>u.rol==='afiliado');
    if(todos.length===0){lista.innerHTML='<p style="color:#5a6a8a;font-size:.85rem;">No hay afiliados registrados aún.</p>';return;}
    const pend=todos.filter(u=>u.estado==='pendiente');

    let html='';
    if(pend.length>0){
      html+=`<div class="pend-box"><div class="pend-tit">⏳ Pendientes de activación (${pend.length})</div>${pend.map(u=>cardUsuario(u)).join('')}</div>`;
    }
    if(resto.length>0){
      html+=`<div style="font-size:.75rem;font-weight:800;color:var(--suave);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;">Afiliados (${resto.length})</div>`;
      html+=resto.map(u=>cardUsuario(u)).join('');
    }
    lista.innerHTML=html;

async function reenviarCredenciales(email) {
  if (!email) { alert('Este usuario no tiene email registrado.'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    alert('✓ Se envió un email de acceso a ' + email + '\nEl afiliado recibirá un link para ingresar o restablecer su contraseña.');
  } catch(e) {
    alert('Error al enviar: ' + e.message);
  }
}

async function cambiarEstado(uid,estado){
  const update = {estado};
  // Al activar, asignar número de socio si no tiene
  if (estado === 'activo') {
    const snap = await db.collection('usuarios').doc(uid).get();
    if (!snap.data()?.nroSocio) {
      const nroSocio = await generarNroSocio();
      update.nroSocio = nroSocio;
    }
  }
  await db.collection('usuarios').doc(uid).update(update);
  cargarUsuariosAdmin();
}

async function generarNroSocio() {
  const snap = await db.collection('usuarios')
    .where('nroSocio', '>=', 'MP-')
    .orderBy('nroSocio', 'desc')
    .limit(1).get();
  if (snap.empty) return 'MP-0001';
  const ultimo = snap.docs[0].data().nroSocio;
  const num = parseInt(ultimo.replace('MP-', '')) + 1;
  return 'MP-' + String(num).padStart(4, '0');
}

// ── ELIMINAR MASCOTA ──
async function confirmarEliminarMascota(uid, index, nombre) {
  if (!confirm(`¿Eliminás a ${nombre}? Esta acción no se puede deshacer.`)) return;
  try {
    const snap = await db.collection('usuarios').doc(uid).get();
    const ud = snap.data();
    const mascotas = ud.mascotas ? [...ud.mascotas] : (ud.mascota ? [ud.mascota] : []);
    mascotas.splice(index, 1);
    await db.collection('usuarios').doc(uid).update({ mascotas });
    const snapNew = await db.collection('usuarios').doc(uid).get();
    renderPanel({ uid, ...snapNew.data() });
  } catch(e) { alert('Error al eliminar: ' + e.message); }
}

// ── ELIMINAR USUARIO (solo admin) ──
function confirmarEliminarUsuario(uid, nombre) {
  if (!confirm(`¿Eliminás el usuario ${nombre}?\n\nEsta acción elimina todos sus datos de MEDIPet. No se puede deshacer.`)) return;
  eliminarUsuario(uid);
}

async function eliminarUsuario(uid) {
  try {
    // 1. Obtener el email del usuario antes de borrar
    const snap = await db.collection('usuarios').doc(uid).get();
    const email = snap.data()?.email || '';
    
    // 2. Borrar documento de Firestore
    await db.collection('usuarios').doc(uid).delete();
    
    // 3. Enviar reset de contraseña para invalidar la sesión
    // y liberar el email para re-registro
    if (email) {
      try {
        await auth.sendPasswordResetEmail(email);
      } catch(e) { /* no critical */ }
    }
    
    cargarUsuariosAdmin();
    alert('Usuario eliminado. Si quiere registrarse de nuevo con el mismo email, primero debe hacer clic en el link que recibió por email para resetear la contraseña, o contactar a MEDIPet.');
  } catch(e) { alert('Error al eliminar: ' + e.message); }
}

async function crearAfiliado(){
  const nombre=v('afilNombre'),apellido=v('afilApellido'),email=v('afilEmail'),tel=v('afilTel');
  const pass=document.getElementById('afilPass').value;
  const mascotaNombre=v('afilMascota'),mascotaRaza=v('afilRaza'),plan=v('afilPlan');
  const afilFechaMascota=document.getElementById('afilFechaMascota')?.value||'';
  setMsg('afilMsg','',true);
  if(!nombre||!email||!pass||!mascotaNombre){setMsg('afilMsg','Completá los campos obligatorios.',false);return;}
  try{
    const nroSocio = await generarNroSocio();
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection('usuarios').doc(cred.user.uid).set({
      uid:cred.user.uid,nombre,apellido,email,telefono:tel,fechaNacimiento:'',
      rol:'afiliado',estado:'activo',
      nroSocio,
      plan:plan||'Sin definir',
      mascotas:[{nombre:mascotaNombre,raza:mascotaRaza,fechaNacimiento:afilFechaMascota,foto:''}],
      creadoEn:TS()
    });
    setMsg('afilMsg','✓ Afiliado '+nombre+' creado y activado.',true);
    ['afilNombre','afilApellido','afilEmail','afilTel','afilPass','afilMascota','afilRaza','afilPlan'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('formNuevoAfiliado').style.display='none';
    cargarUsuariosAdmin();
  }catch(e){
    setMsg('afilMsg',e.code==='auth/email-already-in-use'?'Email ya registrado.':'Error: '+e.message,false);
  }
}

          <div>
            <label class="foto-label" for="newMascotaFoto">📷 &nbsp;Foto (opcional)</label>
            <input type="file" id="newMascotaFoto" accept="image/*" style="display:none" onchange="previewFoto2(this)">
            <img id="newMascotaPreview" src="" style="width:64px;height:64px;border-radius:50%;object-fit:cover;margin-top:8px;display:none;border:3px solid #5BA3E8;">
          </div>
          <div style="display:flex;gap:8px;">
            <button onclick="agregarMascota('${data.uid}')" class="btn-primary" style="flex:1;">Agregar mascota</button>
            <button onclick="toggleFormMascota()" class="bmini brojo" style="padding:10px 16px;">✕</button>
          </div>
          <p id="mascotaMsg" style="font-size:.8rem;"></p>
        </div>
      </div>
      ${listaMascotas.map((m,i)=>`
        <div style="margin-bottom:16px;">
          <div id="carnet-${i}" style="background:linear-gradient(135deg,#2272D9,#0D1B3E);border-radius:16px;padding:18px 20px;color:white;position:relative;overflow:hidden;">
            <div style="position:absolute;top:12px;right:12px;"><svg width="30" height="30"><use href="#mp-iso-w"/></svg></div>
            <div style="font-size:.6rem;font-weight:700;letter-spacing:2px;opacity:.6;text-transform:uppercase;margin-bottom:2px;">PLAN</div>
            <div style="font-size:.85rem;font-weight:800;color:#5BA3E8;margin-bottom:10px;">${m.plan||'Sin definir'}</div>
            <div style="display:flex;align-items:center;gap:12px;">
              ${m.foto?`<img src="${m.foto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.4);">`:`<div style="width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">🐾</div>`}
              <div>
                <div style="font-size:1.2rem;font-weight:900;line-height:1;">${m.nombre||'—'}</div>
                <div style="font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:1px;">${m.raza||''}</div>
              </div>
            </div>
            <div style="margin-top:10px;border-top:1px solid rgba(255,255,255,.1);padding-top:8px;display:flex;justify-content:space-between;align-items:flex-end;">
              <div>
                <div style="font-size:.58rem;opacity:.6;font-weight:700;">TITULAR</div>
                <div style="font-size:.78rem;font-weight:700;">${nombre} ${apellido||''}</div>
                ${data.nroSocio?`<div style="font-size:.58rem;opacity:.5;letter-spacing:1px;">${data.nroSocio}</div>`:''}
              </div>
              <div style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.12);border-radius:100px;padding:3px 9px;font-size:.65rem;font-weight:700;"><span style="width:5px;height:5px;background:#4ade80;border-radius:50%;display:inline-block;"></span> Activo</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
            <select onchange="cambiarPlanMascota('${data.uid}',${i},this.value)" style="flex:1;padding:8px 12px;border:2px solid rgba(26,95,180,.15);border-radius:100px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;color:#1A5FB4;background:#EBF3FC;outline:none;cursor:pointer;">
              <option value="" ${!m.plan||m.plan==='Sin definir'?'selected':''}>Cambiar plan...</option>
              <option value="Básico" ${m.plan==='Básico'?'selected':''}>Básico — $16.000/mes</option>
              <option value="Completo" ${m.plan==='Completo'?'selected':''}>Completo — $45.000/mes</option>
              <option value="Premium" ${m.plan==='Premium'?'selected':''}>Premium — $90.000/mes</option>
            </select>
            <button onclick="descargarCarnet(${i},'${m.nombre}')" class="bmini" style="background:#EBF3FC;color:#1A5FB4;font-size:.8rem;padding:8px 12px;">⬇</button>
            <button onclick="confirmarEliminarMascota('${data.uid}',${i},'${m.nombre}')" style="background:none;border:1px solid #fee2e2;color:#991b1b;border-radius:100px;padding:7px 12px;font-size:.8rem;cursor:pointer;">🗑</button>
          </div>
        </div>`).join('')}
    </div>

    <div class="seccion">
      <div class="stit">Mi foto de perfil</div>
      ${data.fotoTitular?`<img src="${data.fotoTitular}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #5BA3E8;margin-bottom:10px;">`:''}
      <label class="foto-label" for="uploadFotoTitular">🧑 &nbsp;${data.fotoTitular?'Cambiar foto':'Subir mi foto'}</label>
      <input type="file" id="uploadFotoTitular" accept="image/*" style="display:none" onchange="actualizarFotoTitular(this,'${data.uid}')">
      <p id="fotoTitularMsg" style="font-size:.8rem;margin-top:6px;"></p>
    </div>

    <div class="seccion"><div class="stit">Cambiar contraseña</div>
      <input type="password" id="nuevaPass" placeholder="Nueva contraseña" class="input-field">
      <button onclick="cambiarPass()" class="btn-primary" style="margin-top:10px;">Actualizar</button>
      <p id="passMsg" style="font-size:.8rem;margin-top:8px;"></p>
    </div>`;

  }else if(rol==='prestador'){
    html=`<div class="panel-header"><div><div class="panel-rol prestador">Prestador</div><div class="panel-nombre">${nombre} ${apellido||''}</div>${clinica?`<div style="font-size:.85rem;color:#5a6a8a;">${clinica}</div>`:''}</div><div style="font-size:3rem;">🏥</div></div>
    <div class="seccion"><div class="stit">Registrar atención</div>
      <div class="fstack">
        <input type="email" id="atenAfiliado" placeholder="Email del afiliado *" class="input-field">
        <input type="text" id="atenMascota" placeholder="Nombre de la mascota" class="input-field">
        <textarea id="atenDescripcion" placeholder="Descripción *" class="input-field" style="height:80px;resize:vertical;"></textarea>
        <input type="number" id="atenMonto" placeholder="Monto ($) *" class="input-field">
        <button onclick="cargarAtencion()" class="btn-primary">Registrar atención</button>
        <p id="atenMsg" style="font-size:.8rem;"></p>
      </div>
    </div>
    <div class="seccion"><div class="stit">Historial</div><div id="historialAtenciones"><p style="color:#5a6a8a;font-size:.85rem;">Cargando...</p></div></div>
    <div class="seccion"><div class="stit">Cambiar contraseña</div>
      <input type="password" id="nuevaPass" placeholder="Nueva contraseña" class="input-field">
      <button onclick="cambiarPass()" class="btn-primary" style="margin-top:10px;">Actualizar</button>
      <p id="passMsg" style="font-size:.8rem;margin-top:8px;"></p>
    </div>`;
    setTimeout(cargarHistorial,300);

  }else if(rol==='admin'){
    html=`<div class="panel-header"><div><div class="panel-rol admin">Administrador</div><div class="panel-nombre">Panel MEDIPet</div></div><div style="font-size:2.5rem;">⚙️</div></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('afiliados',this)">Afiliados</button>
      <button class="tab" onclick="switchTab('prestadores',this)">Prestadores</button>
      <button class="tab" onclick="switchTab('pagos',this)">Pagos</button>
    </div>
    <div id="tab-afiliados" class="tab-content">
      <div class="seccion">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
          <div class="stit" style="margin-bottom:0;">Afiliados</div>
          <button onclick="toggleFormAfiliado()" class="bmini bverde" style="font-size:.8rem;padding:7px 14px;">+ Nuevo</button>
        </div>
        <div id="formNuevoAfiliado" style="display:none;" class="form-box">
          <p style="font-size:.75rem;font-weight:800;color:var(--noche);margin-bottom:10px;text-transform:uppercase;">Crear afiliado</p>
          <div class="fstack">
            <div class="frow">
              <input type="text" id="afilNombre" placeholder="Nombre *" class="input-field">
              <input type="text" id="afilApellido" placeholder="Apellido" class="input-field">
            </div>
            <input type="email" id="afilEmail" placeholder="Email *" class="input-field">
            <input type="tel" id="afilTel" placeholder="Teléfono" class="input-field">
            <input type="password" id="afilPass" placeholder="Contraseña inicial *" class="input-field">
            <div class="frow">
              <input type="text" id="afilMascota" placeholder="Mascota *" class="input-field">
              <input type="text" id="afilRaza" placeholder="Raza" class="input-field">
            </div>
            <div><label style="font-size:0.75rem;font-weight:700;display:block;margin-bottom:4px;">Fecha nac. mascota</label><input type="date" id="afilFechaMascota" class="input-field"></div>
            <select id="afilPlan" class="input-field">
              <option value="">Plan...</option>
              <option value="Básico">Básico</option>
              <option value="Completo">Completo</option>
              <option value="Premium">Premium</option>
            </select>
            <div style="display:flex;gap:8px;">
              <button onclick="crearAfiliado()" class="btn-primary" style="flex:1;">Crear afiliado</button>
              <button onclick="toggleFormAfiliado()" class="bmini brojo" style="padding:10px 16px;">✕</button>
            </div>
            <p id="afilMsg" style="font-size:.8rem;"></p>
          </div>
        </div>
        <div id="listaUsuarios"><p style="color:#5a6a8a;font-size:.85rem;">Cargando...</p></div>
      </div>
    </div>
    <div id="tab-prestadores" class="tab-content" style="display:none;">
      <div class="seccion"><div class="stit">Crear prestador</div>
        <div class="fstack">
          <div class="frow">
            <input type="text" id="prestNombre" placeholder="Nombre *" class="input-field">
            <input type="text" id="prestApellido" placeholder="Apellido" class="input-field">
          </div>
          <input type="email" id="prestEmail" placeholder="Email *" class="input-field">
          <input type="text" id="prestClinica" placeholder="Clínica / Consultorio" class="input-field">
          <input type="password" id="prestPass" placeholder="Contraseña inicial *" class="input-field">
          <button onclick="crearPrestador()" class="btn-primary">Crear prestador</button>
          <p id="prestMsg" style="font-size:.8rem;"></p>
        </div>
      </div>
    </div>
    <div id="tab-pagos" class="tab-content" style="display:none;">
      <div class="seccion"><div class="stit">Atenciones y pagos</div><div id="listaAtenciones"><p style="color:#5a6a8a;font-size:.85rem;">Cargando...</p></div></div>
    </div>`;
    setTimeout(cargarUsuariosAdmin,300);
  }
  document.getElementById('panelContent').innerHTML=html;
}
</script>
</body>
</html>
